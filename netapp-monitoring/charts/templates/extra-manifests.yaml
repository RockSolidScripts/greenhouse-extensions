# Renders arbitrary user-supplied manifests from .Values.extraManifests.
# Replaces the owner-info subchart: use it to ship owner-info / support-group
# metadata objects alongside the chart. Each list entry is a full manifest and
# is passed through `tpl` so it may reference chart values.
