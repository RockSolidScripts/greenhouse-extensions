---
harvest:
  image:
    repository: keppel.eu-de-1.cloud.sap/ccloud/harvest
    tag: 25.11.0-20251126205434
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "1Gi"
    limits:
      cpu: "500m"
      memory: "2Gi"
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

auth:
  auth_style: basic_auth

exporters:
  prometheus:
    exporter: Prometheus
    port: 13000

defaults:
  collectors:
    - Ems
    - Rest
    - RestPerf
    - KeyPerf
    - Unix
    - Simple
  use_insecure_tls: true
  exporters:
    - prometheus

netappsd:
  enabled: true
  serviceAccountName: netappsd
  lob: CCloud
  image:
    repository: keppel.eu-de-1.cloud.sap/ccloud/netappsd
    tag: dme-strg-ganesh-test-6
    pullPolicy: Always
  # Image for the pre-delete cleanup hook (kubectl) that removes the per-filer
  # worker Deployments the master created at runtime.
  cleanup:
    image: keppel.eu-de-1.cloud.sap/ccloud-registry-k8s-io-mirror/kubectl:v1.36.1
  region: "qa-de-1"
  ports:
    master: 8000
    harvest: 13000
    worker: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  netapp_exporter_user: vault+kvv2:///secrets/shared/harvest/harvest-ad/local-user/username
  netapp_exporter_password: vault+kvv2:///secrets/shared/harvest/harvest-ad/local-user/password
  netbox_api_token: vault+kvv2:///secrets/shared/harvest/netapp/token
  netbox_host: vault+kvv2:///secrets/shared/harvest/netapp/host
  credentials_file: /app/secrets/local-basic-auth.yml
  credentials_secret: local-basic-auth

# apps: Configures which filers are discovered by the service discovery.
# Each key corresponds to a label assigned to devices in Netbox.
# cinder: Targets filers labeled as cinder storage backends.
# manila: Targets filers labeled as manila shared filesystem backends.
# apod: Targets filers labeled as apod storage devices.
# cinder-manila: Targets filers that have both the cinder and manila labels.
apps:
  cinder:
    enabled: true
  manila:
    enabled: true
  apod:
    enabled: true
  cinder-manila:
    enabled: true

finalizers:
  - dme-storage/prevent-deletion

owner-info:
  support-group: storage
  service: netapp-monitoring
  maintainers:
    - Ganesh Kugulakrishnan
    - Chandrakanth Renduchintala
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/prometheus-exporters/netapp-monitoring