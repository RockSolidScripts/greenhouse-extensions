image:
  repository: ghcr.io/cloudoperators/gatekeeper-addons
  tag: ""
  pullPolicy: IfNotPresent

cluster:
  name: ""
  layer: ""
  type: ""

swift:
  authURL: ""
  username: ""
  password: ""
  userDomain: Default
  projectName: ""
  projectDomain: Default
  region: ""
  alternateRegion: ""

analyzer:
  replicas: 1
  extraMergingRules: []        # appended to the built-in generic merging rules; supply fleet-specific dedup rules here
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 64Mi

imageChecker:
  replicas: 2
  registryURL: ""
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 25m
      memory: 64Mi

helmManifestParser:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 1000m
      memory: 192Mi
